; HausRadar – ESP32 MQTT-Firmware
;
; Environments:
;   esp32dev      – echter LD2450-Sensor (UART2, GPIO16/17)
;   esp32dev-sim  – Walker-Simulation (kein LD2450 nötig)
;   lolin_d32     – echter LD2450-Sensor auf Wemos/LOLIN D32
;   lolin_d32-sim – Walker-Simulation auf Wemos/LOLIN D32
;
; Flashen:  pio run -e esp32dev -t upload
; Flashen:  pio run -e esp32dev-sim -t upload
; Monitor:  pio device monitor

[common]
platform      = espressif32
framework     = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21

[env:esp32dev]
extends    = common
board      = esp32dev
build_flags = -DCORE_DEBUG_LEVEL=0

[env:esp32dev-sim]
extends    = common
board      = esp32dev
build_flags = -DCORE_DEBUG_LEVEL=0 -DSIMULATE

[env:lolin_d32]
extends    = common
board      = lolin_d32
build_flags = -DCORE_DEBUG_LEVEL=0

[env:lolin_d32-sim]
extends    = common
board      = lolin_d32
build_flags = -DCORE_DEBUG_LEVEL=0 -DSIMULATE
