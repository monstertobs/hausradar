# HausRadar – Mosquitto-Konfiguration
#
# Installation:
#   sudo cp deploy/mosquitto-hausradar.conf /etc/mosquitto/conf.d/hausradar.conf
#   sudo systemctl restart mosquitto
#
# SICHERHEIT: Passwort-Authentifizierung aktivieren (empfohlen):
#   Siehe docs/security-hardening.md – Abschnitt "MQTT-Authentifizierung einrichten"
#
# Kurzanleitung Passwort-Datei erstellen:
#   sudo mosquitto_passwd -c /etc/mosquitto/passwd hausradar-server
#   sudo mosquitto_passwd /etc/mosquitto/passwd hausradar-sensor
#   → Datei-Pfad unten in password_file eintragen und allow_anonymous auf false setzen

listener 1883
# Nur localhost, wenn Backend und Mosquitto auf demselben Pi laufen:
# bind_address 127.0.0.1

# --- Authentifizierung -------------------------------------------------------
# Entwicklung (unsicher, nur im isolierten Heimnetz):
allow_anonymous true

# Produktion (empfohlen – Zeilen tauschen und Passwort-Datei anlegen):
# allow_anonymous false
# password_file /etc/mosquitto/passwd
# acl_file /etc/mosquitto/hausradar-acl

# --- Payload-Größenlimit (schützt vor Flooding) ------------------------------
message_size_limit 65536

# --- Datenpersistenz ---------------------------------------------------------
persistence true
persistence_location /var/lib/mosquitto/

# --- Logging -----------------------------------------------------------------
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
