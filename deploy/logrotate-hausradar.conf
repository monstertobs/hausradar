# HausRadar – Logrotation
#
# Installation:
#   sudo cp deploy/logrotate-hausradar.conf /etc/logrotate.d/hausradar
#
# Rotiert das Backend-Log wöchentlich, behält 4 Wochen.

/var/log/hausradar/hausradar.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    create 0640 root adm
}
